name: SQL Linting

on: [push, pull_request]

jobs:
  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install SQLFluff
        run: pip install sqlfluff-templater-dbt sqlfluff

      - name: Lint SQL files
        run: sqlfluff lint sql_scripts/ --dialect bigquery